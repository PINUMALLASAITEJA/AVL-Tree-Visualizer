<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AVL Tree Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AVL Tree Visualizer</h1>

<div class="controls">
<input type="number" id="value" placeholder="Enter number">
<button onclick="insertNode()">Insert</button>
<button onclick="clearTree()">Reset</button>
</div>

<div id="status">Insert nodes to build AVL Tree</div>

<svg id="tree" width="1200" height="650"></svg>

<script src="script.js"></script>

</body>
</html>
